<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇題練習 - 單字學習艙</title>
    <meta name="theme-color" content="#020617">
    <meta name="description" content="英文單字選擇題練習，支援章節、題數與隨機出題。">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="icon" href="../static/icons/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" sizes="180x180" href="../static/icons/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
            --background: #f5f7fb;
            --foreground: #0f172a;
            --muted: #64748b;
            --muted-soft: #94a3b8;
            --card: rgba(255, 255, 255, 0.88);
            --card-strong: #ffffff;
            --border: rgba(15, 23, 42, 0.08);
            --border-strong: rgba(15, 23, 42, 0.14);
            --shadow-sm: 0 12px 30px rgba(15, 23, 42, 0.06);
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.09);
            --shadow-lg: 0 32px 80px rgba(15, 23, 42, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.96), rgba(245, 247, 251, 0.72) 40%, rgba(245, 247, 251, 1) 78%),
                linear-gradient(180deg, #fbfcfe 0%, #f5f7fb 100%);
            -webkit-tap-highlight-color: transparent;
        }

        .choice-shell {
            position: relative;
            isolation: isolate;
        }

        .choice-shell::before,
        .choice-shell::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(64px);
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
        }

        .choice-shell::before {
            width: 18rem;
            height: 18rem;
            top: 2rem;
            left: -4rem;
            background: rgba(191, 219, 254, 0.45);
        }

        .choice-shell::after {
            width: 22rem;
            height: 22rem;
            right: -6rem;
            bottom: 2rem;
            background: rgba(226, 232, 240, 0.9);
        }

        .glass-panel,
        .quiz-word-card,
        .completion-panel,
        .floating-control {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: var(--shadow);
        }

        .quiz-board {
            min-height: 34rem;
        }

        .quiz-word {
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1;
        }

        .quiz-word-size-default {
            font-size: 2.75rem;
        }

        .quiz-word-size-long {
            font-size: 2.35rem;
        }

        .quiz-word-size-xlong {
            font-size: 2rem;
        }

        @media (min-width: 640px) {
            .quiz-word-size-default {
                font-size: 3.75rem;
            }

            .quiz-word-size-long {
                font-size: 3.15rem;
            }

            .quiz-word-size-xlong {
                font-size: 2.65rem;
            }
        }

        .quiz-option {
            appearance: none;
            display: flex;
            width: 100%;
            min-width: 0;
            min-height: 5.25rem;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 2px solid transparent;
            border-radius: 1.25rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem;
            color: #334155;
            text-align: left;
            box-shadow: var(--shadow-sm);
            transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
            touch-action: manipulation;
        }

        .quiz-option:not(:disabled):hover {
            transform: translateY(-1px);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-lg);
        }

        .quiz-option:not(:disabled):active {
            transform: scale(0.98);
        }

        .quiz-option:disabled {
            cursor: default;
        }

        .quiz-option.is-correct {
            border-color: #22c55e;
            background: #f0fdf4;
            color: #166534;
            box-shadow: 0 18px 42px rgba(34, 197, 94, 0.12);
        }

        .quiz-option.is-wrong {
            border-color: #ef4444;
            background: #fef2f2;
            color: #991b1b;
            box-shadow: 0 18px 42px rgba(239, 68, 68, 0.12);
        }

        .quiz-option.is-muted {
            opacity: 0.52;
            box-shadow: var(--shadow-sm);
        }

        .option-key {
            display: inline-flex;
            height: 2rem;
            width: 2rem;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: #f1f5f9;
            color: #64748b;
            font-size: 0.82rem;
            font-weight: 800;
        }

        .option-content {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .option-content {
                gap: 1rem;
            }
        }

        .quiz-option.is-correct .option-key {
            background: #dcfce7;
            color: #15803d;
        }

        .quiz-option.is-wrong .option-key {
            background: #fee2e2;
            color: #b91c1c;
        }

        .option-text {
            min-width: 0;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1.55;
            font-size: 1rem;
            font-weight: 700;
        }

        @media (min-width: 640px) {
            .option-text {
                font-size: 1.125rem;
            }
        }

        .option-icon {
            display: inline-flex;
            height: 1.5rem;
            width: 1.5rem;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .option-icon.is-correct {
            color: #22c55e;
        }

        .option-icon.is-wrong {
            color: #ef4444;
        }

        @media (max-width: 480px) {
            .quiz-option {
                min-height: 4.85rem;
                padding: 0.9rem;
            }
        }
    </style>
</head>

<body class="choice-shell min-h-screen text-slate-800">
    <div class="flex min-h-screen flex-col">
        <header class="shrink-0 px-3 py-3 sm:px-4 md:px-6 md:py-5">
            <div class="glass-panel mx-auto flex max-w-5xl items-center justify-between gap-3 rounded-[1.5rem] px-3 py-3 sm:px-4 md:rounded-[1.75rem] md:px-5">
                <div class="flex min-w-0 items-center gap-3 md:gap-4">
                    <button id="exit-button" type="button"
                        class="floating-control inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-slate-500 transition hover:text-slate-900"
                        aria-label="回到首頁">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="min-w-0">
                        <p class="text-[11px] font-bold uppercase text-slate-400">Multiple Choice</p>
                        <h1 id="chapter-title" class="truncate text-base font-extrabold text-slate-900 sm:text-lg md:text-xl">選擇題練習</h1>
                    </div>
                </div>

                <div class="flex shrink-0 items-center gap-2 sm:gap-3">
                    <div class="hidden text-right sm:block">
                        <p class="text-[11px] font-bold uppercase text-slate-400">答對</p>
                        <p id="quiz-score" class="font-mono text-sm font-extrabold text-slate-900 md:text-base">0 / 0</p>
                    </div>
                    <div class="h-9 w-px bg-slate-200"></div>
                    <div class="text-right">
                        <p class="text-[11px] font-bold uppercase text-slate-400">進度</p>
                        <p id="quiz-progress" class="font-mono text-sm font-extrabold text-slate-900 md:text-base">0 / 0</p>
                    </div>
                    <div class="h-9 w-px bg-slate-200"></div>
                    <div class="w-14 text-right sm:w-16">
                        <p class="text-[11px] font-bold uppercase text-slate-400">時間</p>
                        <p id="quiz-timer" class="font-mono text-sm font-extrabold text-slate-900 md:text-base">00:00</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex flex-1 px-3 pb-4 sm:px-4 md:px-6 md:pb-6">
            <section class="glass-panel quiz-board relative mx-auto flex w-full max-w-3xl flex-1 flex-col overflow-hidden rounded-[1.75rem] p-3 sm:p-4 md:rounded-[2rem] md:p-6">
                <div id="loading-state" class="flex flex-1 flex-col items-center justify-center px-6 text-center">
                    <div class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-900 text-white shadow-[0_18px_40px_rgba(15,23,42,0.18)]">
                        <i id="loading-icon" class="fa-solid fa-list-check text-xl"></i>
                    </div>
                    <p id="loading-title" class="text-lg font-extrabold text-slate-900">正在準備選擇題</p>
                    <p id="loading-message" class="mt-2 max-w-md text-sm leading-6 text-slate-400">正在讀取章節單字資料。</p>
                </div>

                <div id="quiz-screen" class="hidden min-h-0 flex-1 flex-col">
                    <div class="quiz-word-card relative mb-4 flex min-h-[13rem] flex-col items-center justify-center rounded-[1.6rem] px-5 py-8 text-center sm:mb-5 md:min-h-[14rem] md:rounded-[1.8rem]">
                        <button id="speak-word-button" type="button"
                            class="absolute right-4 top-4 inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white/90 text-slate-400 transition hover:text-slate-900"
                            aria-label="播放單字發音">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                        <p class="mb-4 text-xs font-bold uppercase text-slate-400">選出正確中文意思</p>
                        <h2 id="quiz-word" class="quiz-word quiz-word-size-default font-extrabold text-slate-900">Loading...</h2>
                    </div>

                    <div id="quiz-options" class="flex flex-1 flex-col justify-center gap-3">
                    </div>
                </div>

                <div id="quiz-complete-screen" class="completion-panel absolute inset-0 z-20 hidden flex-col items-center justify-center px-5 text-center">
                    <div class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-green-100 text-3xl text-green-500 shadow-sm md:h-24 md:w-24 md:text-4xl">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <p class="text-xs font-bold uppercase text-slate-400">Quiz Complete</p>
                    <h2 class="mt-2 text-2xl font-extrabold text-slate-900 md:text-3xl">恭喜完成測驗！</h2>
                    <p id="quiz-complete-stats" class="mt-3 text-sm font-medium text-slate-500 md:text-base">耗時 00:00，答對 0 / 0 題</p>
                    <div class="mt-8 flex w-full max-w-md flex-col gap-3 sm:flex-row">
                        <button id="complete-home-button" type="button"
                            class="flex-1 rounded-2xl border border-slate-200 bg-white px-5 py-3.5 font-bold text-slate-600 transition hover:bg-slate-50 hover:text-slate-900">
                            回到首頁
                        </button>
                        <button id="complete-restart-button" type="button"
                            class="flex-1 rounded-2xl bg-slate-900 px-5 py-3.5 font-bold text-white shadow-[0_24px_60px_rgba(15,23,42,0.22)] transition hover:bg-slate-800">
                            再來一局
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../static/js/multiple-choice.js"></script>
    <script src="../static/js/pwa.js"></script>
</body>

</html>
