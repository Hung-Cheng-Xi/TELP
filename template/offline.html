<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>離線模式 | 單字學習艙</title>
    <meta name="theme-color" content="#4f46e5">
    <style>
        :root {
            color-scheme: light;
            --bg: #eef2ff;
            --card: #ffffff;
            --ink: #1e293b;
            --muted: #64748b;
            --accent: #4f46e5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.15), transparent 30%),
                linear-gradient(180deg, #f8fafc, var(--bg));
            color: var(--ink);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 560px);
            background: var(--card);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(79, 70, 229, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 2.75rem);
        }

        p {
            margin: 0 0 12px;
            color: var(--muted);
            line-height: 1.7;
        }

        a {
            display: inline-block;
            margin-top: 12px;
            color: white;
            text-decoration: none;
            background: var(--accent);
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>目前離線中</h1>
        <p>已經看過並快取的章節仍可繼續使用，但你剛剛開啟的頁面尚未存到裝置裡。</p>
        <p>恢復連線後重新整理一次，之後這個頁面就能被 PWA 離線保存。</p>
        <a href="../index.html">回到首頁</a>
    </main>
</body>
</html>
