<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單詞配對配 - 單字學習艙</title>
    <meta name="theme-color" content="#020617">
    <meta name="description" content="中英文單字配對練習，支援章節、題數與隨機出題。">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./static/icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./static/icons/icon-192.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
            --background: #f5f7fb;
            --foreground: #0f172a;
            --muted: #64748b;
            --muted-soft: #94a3b8;
            --card: rgba(255, 255, 255, 0.88);
            --card-strong: #ffffff;
            --border: rgba(15, 23, 42, 0.08);
            --border-strong: rgba(15, 23, 42, 0.14);
            --shadow-sm: 0 12px 30px rgba(15, 23, 42, 0.06);
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.09);
            --shadow-lg: 0 32px 80px rgba(15, 23, 42, 0.15);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.96), rgba(245, 247, 251, 0.72) 40%, rgba(245, 247, 251, 1) 78%),
                linear-gradient(180deg, #fbfcfe 0%, #f5f7fb 100%);
            -webkit-tap-highlight-color: transparent;
        }

        .matching-shell {
            position: relative;
            isolation: isolate;
        }

        .matching-shell::before,
        .matching-shell::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(64px);
            opacity: 0.5;
            z-index: -1;
            pointer-events: none;
        }

        .matching-shell::before {
            width: 18rem;
            height: 18rem;
            top: 2rem;
            left: -4rem;
            background: rgba(191, 219, 254, 0.45);
        }

        .matching-shell::after {
            width: 22rem;
            height: 22rem;
            right: -6rem;
            bottom: 2rem;
            background: rgba(226, 232, 240, 0.9);
        }

        .glass-panel,
        .match-card,
        .completion-panel,
        .floating-control {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: var(--shadow);
        }

        .match-board {
            min-height: 0;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-auto-rows: minmax(5.5rem, auto);
            align-content: center;
        }

        .match-grid.hidden {
            display: none;
        }

        @media (min-width: 640px) {
            .match-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                grid-auto-rows: minmax(6rem, auto);
            }
        }

        @media (min-width: 900px) {
            .match-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                grid-auto-rows: minmax(6.5rem, auto);
            }
        }

        .match-card {
            appearance: none;
            position: relative;
            width: 100%;
            min-width: 0;
            min-height: 5.5rem;
            overflow: hidden;
            border-radius: 1.25rem;
            color: #334155;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
            touch-action: manipulation;
        }

        .match-card:active {
            transform: scale(0.97);
        }

        .match-card:hover {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-lg);
        }

        .match-card.is-selected {
            background: #f8fafc;
            border-color: #0f172a;
            color: #0f172a;
            box-shadow: 0 0 0 2px #0f172a, var(--shadow-sm);
        }

        .match-card.is-matched {
            background: #f0fdf4;
            border-color: #22c55e;
            color: #166534;
            pointer-events: none;
        }

        .match-card.is-error {
            background: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
            animation: shake 0.38s ease;
        }

        .match-card.is-hiding {
            transform: scale(0.82);
            opacity: 0;
            pointer-events: none;
        }

        .match-card-text {
            display: -webkit-box;
            max-width: 100%;
            overflow: hidden;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            overflow-wrap: anywhere;
            word-break: break-word;
            line-height: 1.35;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }
        }
    </style>
</head>

<body class="matching-shell h-screen overflow-hidden text-slate-800">
    <div class="flex h-full min-h-0 flex-col">
        <header class="shrink-0 px-3 py-3 sm:px-4 md:px-6 md:py-5">
            <div class="glass-panel mx-auto flex max-w-6xl items-center justify-between gap-3 rounded-[1.5rem] px-3 py-3 sm:px-4 md:rounded-[1.75rem] md:px-5">
                <div class="flex min-w-0 items-center gap-3 md:gap-4">
                    <button id="exit-button" type="button"
                        class="floating-control inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-slate-500 transition hover:text-slate-900"
                        aria-label="回到首頁">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="min-w-0">
                        <p class="text-[11px] font-bold uppercase tracking-[0.22em] text-slate-400">Matching Game</p>
                        <h1 id="chapter-title" class="truncate text-base font-extrabold tracking-tight text-slate-900 sm:text-lg md:text-xl">單詞配對配</h1>
                    </div>
                </div>

                <div class="flex shrink-0 items-center gap-2 sm:gap-3">
                    <div class="hidden text-right sm:block">
                        <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-slate-400">回合</p>
                        <p id="round-label" class="font-mono text-sm font-extrabold text-slate-900 md:text-base">1 / 1</p>
                    </div>
                    <div class="h-9 w-px bg-slate-200"></div>
                    <div class="text-right">
                        <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-slate-400">進度</p>
                        <p id="game-progress" class="font-mono text-sm font-extrabold text-slate-900 md:text-base">0 / 0</p>
                    </div>
                    <div class="h-9 w-px bg-slate-200"></div>
                    <div class="w-14 text-right sm:w-16">
                        <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-slate-400">時間</p>
                        <p id="game-timer" class="font-mono text-sm font-extrabold text-slate-900 md:text-base">00:00</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="min-h-0 flex-1 px-3 pb-3 sm:px-4 md:px-6 md:pb-6">
            <section class="glass-panel match-board relative mx-auto flex h-full max-w-6xl flex-col overflow-hidden rounded-[1.75rem] md:rounded-[2rem]">
                <div id="loading-state" class="flex flex-1 flex-col items-center justify-center px-6 text-center">
                    <div class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-900 text-white shadow-[0_18px_40px_rgba(15,23,42,0.18)]">
                        <i class="fa-solid fa-link text-xl"></i>
                    </div>
                    <p class="text-lg font-extrabold text-slate-900">正在準備配對題目</p>
                    <p class="mt-2 max-w-md text-sm leading-6 text-slate-400">正在讀取章節單字資料。</p>
                </div>

                <div id="game-grid" class="match-grid hidden min-h-0 flex-1 gap-3 overflow-y-auto p-3 sm:gap-4 sm:p-4 md:p-6">
                </div>

                <div id="game-complete-screen" class="completion-panel absolute inset-0 z-20 hidden flex-col items-center justify-center px-5 text-center">
                    <div class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-green-100 text-3xl text-green-500 shadow-sm md:h-24 md:w-24 md:text-4xl">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <p class="text-xs font-bold uppercase tracking-[0.24em] text-slate-400">Round Complete</p>
                    <h2 class="mt-2 text-2xl font-extrabold tracking-tight text-slate-900 md:text-3xl">恭喜完成配對！</h2>
                    <p id="game-complete-stats" class="mt-3 text-sm font-medium text-slate-500 md:text-base">耗時 00:00，完成 0 組單字</p>
                    <div class="mt-8 flex w-full max-w-md flex-col gap-3 sm:flex-row">
                        <button id="complete-home-button" type="button"
                            class="flex-1 rounded-2xl border border-slate-200 bg-white px-5 py-3.5 font-bold text-slate-600 transition hover:bg-slate-50 hover:text-slate-900">
                            回到首頁
                        </button>
                        <button id="complete-restart-button" type="button"
                            class="flex-1 rounded-2xl bg-slate-900 px-5 py-3.5 font-bold text-white shadow-[0_24px_60px_rgba(15,23,42,0.22)] transition hover:bg-slate-800">
                            再來一局
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="./static/js/word-matching.js"></script>
    <script src="./static/js/pwa.js"></script>
</body>

</html>
